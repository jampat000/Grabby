# Build Grabby PyInstaller bundle + Inno Setup installer on Windows.
# Produces installer/output/GrabbySetup.exe as a workflow artifact.
# Runs only when you push a version tag (v*) or run this workflow manually — not on every branch/PR push.
# Tag push v* also runs the release job (GitHub Release + GrabbySetup.exe).

name: Build installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Same commit can trigger twice (e.g. push `master` then push tag `v1.0.3` on that commit).
# Group by commit SHA so the newest run cancels the older duplicate; tag run usually wins if you push branch then tag.
concurrency:
  group: build-installer-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

# Opt in to Node 24 for JS actions until all deps default to it (GitHub deprecation of Node 20).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # packaging/build.ps1 uses `py -m venv` when .venv is missing; runners often lack `py`.
      - name: Pre-create venv
        shell: pwsh
        run: |
          if (-not (Test-Path ".venv\Scripts\python.exe")) {
            python -m venv .venv
          }

      - name: Build GrabbySetup.exe
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          & "${{ github.workspace }}\installer\build.ps1" -Clean -InstallInnoSetupIfMissing

      - name: Smoke test packaged Grabby.exe
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $exe = "${{ github.workspace }}\dist\Grabby\Grabby.exe"
          if (-not (Test-Path -LiteralPath $exe)) { throw "Missing packaged exe: $exe" }
          & $exe --help
          $port = 28765
          $proc = Start-Process -FilePath $exe -ArgumentList @("--host","127.0.0.1","--port",$port) -PassThru -WindowStyle Hidden
          try {
            $deadline = (Get-Date).AddMinutes(2)
            $ok = $false
            while ((Get-Date) -lt $deadline) {
              try {
                $r = Invoke-RestMethod -Uri "http://127.0.0.1:$port/healthz" -TimeoutSec 3
                if ($r.status -eq "ok" -and $r.version) {
                  if ($r.version.Length -lt 1) { throw "empty version in healthz" }
                  $ok = $true
                  break
                }
              } catch {
                Start-Sleep -Milliseconds 500
              }
            }
            if (-not $ok) { throw "Packaged app did not respond OK at /healthz on port $port" }
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            Get-Process -Name "Grabby" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          }

      # Repo Settings → Variables: ENABLE_CODE_SIGNING = true
      # Repo Settings → Secrets: WINDOWS_PFX_BASE64 (PFX as base64), WINDOWS_PFX_PASSWORD
      - name: Sign installer (optional)
        if: ${{ vars.ENABLE_CODE_SIGNING == 'true' }}
        shell: pwsh
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          & "${{ github.workspace }}\scripts\sign-installer.ps1" -InstallerPath "${{ github.workspace }}\installer\output\GrabbySetup.exe"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: GrabbySetup
          path: installer/output/GrabbySetup.exe
          if-no-files-found: error

  # Creates the GitHub Release + attaches GrabbySetup.exe (no deployment Environment gate — those often
  # stall on “Review deployments” and leave tags without a Latest release).
  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installer
        uses: actions/download-artifact@v8
        with:
          name: GrabbySetup
          path: release-asset

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: release-asset/GrabbySetup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
