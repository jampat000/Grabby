# Build Grabby PyInstaller bundle + Inno Setup installer on Windows.
# Produces installer/output/GrabbySetup.exe as a workflow artifact.
# Push a tag matching v* (e.g. v1.2.3) to also attach the installer to a GitHub Release.

name: Build installer

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-installer-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Opt in to Node 24 for JS actions until all deps default to it (GitHub deprecation of Node 20).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # packaging/build.ps1 uses `py -m venv` when .venv is missing; runners often lack `py`.
      - name: Pre-create venv
        shell: pwsh
        run: |
          if (-not (Test-Path ".venv\Scripts\python.exe")) {
            python -m venv .venv
          }

      - name: Build GrabbySetup.exe
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          & "${{ github.workspace }}\installer\build.ps1" -Clean -InstallInnoSetupIfMissing

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: GrabbySetup
          path: installer/output/GrabbySetup.exe
          if-no-files-found: error

  # Waits at "Review deployments" until a configured reviewer approves (repo Settings → Environments → release).
  # Build + artifact upload already finished; approve here before creating the GitHub Release.
  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: write
    steps:
      - name: Download installer
        uses: actions/download-artifact@v8
        with:
          name: GrabbySetup
          path: release-asset

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: release-asset/GrabbySetup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
