# Auto-tags v{X.Y.Z} from VERSION on the merge commit when VERSION changes on the default branch.
#
# IMPORTANT: `git push` of the tag uses `GITHUB_TOKEN`, which does NOT fire other `on: push: tags`
# workflows (GitHub security). So we explicitly dispatch "Build installer" for that tag ref.
# Manual run: Actions → "Tag release (from VERSION)" → Run workflow (retry / if auto was skipped).
name: Tag release (from VERSION)

on:
  push:
    branches:
      - master
      - main
    paths:
      - "VERSION"
  workflow_dispatch:

permissions:
  contents: write
  actions: write # required to workflow_dispatch "Build installer" after pushing the tag

concurrency:
  group: tag-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push tag if missing
        id: tag_push
        run: |
          set -e
          echo "pushed=false" >> "$GITHUB_OUTPUT"
          V="$(tr -d ' \r\n' < VERSION)"
          if ! echo "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "VERSION must be semver X.Y.Z, got: $V"
            exit 1
          fi
          TAG="v${V}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag $TAG already exists on origin — skipping (idempotent)."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"
          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Pushed $TAG — dispatching Build installer…"

      - name: Dispatch Build installer
        if: steps.tag_push.outputs.pushed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = '${{ steps.tag_push.outputs.tag }}';
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-installer.yml',
              ref: tag,
            });
            core.info(`Dispatched build-installer.yml for ref ${tag}`);
